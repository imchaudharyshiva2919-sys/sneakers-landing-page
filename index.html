<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sneakers Landing Page</title>
</head>
<body>
    
<section class = "navbar">

    <div class="inner-nav"> </div>

    <div class="logo">

      <img src="images/reaL.LOGO.png" class="logo-img" , alt="logo">
      
      <h1>VELORA</h1>
    
    </div>

    <div class="search-box">
    <input type="text" placeholder="Search Here...">
    <i class="fa-solid fa-magnifying-glass"></i>
    </div>

     <div class="elements">
      <a href="https://www.nike.in/lp/men-desktop">Men</a>
      <a>Women</a>
      <a>Kids</a>
      <a>Contact</a>
    </div>
 

    <div class="wish-cart">
    <i class="fa-solid fa-heart"></i>

    <i class="fa-solid fa-cart-arrow-down"></i>
    </div>

</section>

<section class="hero">
  <h1 class="hero-logo">VELORA</h1>
  <p class="hero-tagline">Where every step tells a story.</p>
  <button class="hero-cta">Explore Collection</button>
</section>

<section class="brand-items">
  <div class="brand">
    <img src="images/footwear.png" alt="Footwear">

    <div class="overlay-text">
      <h3>DIFFERENT STEPS.</h3>
      <h1>One Standard</h1>

      <div class="title">
        <h2>Velora</h2>
        <p>Raised by purpose<br>Worn with pride</p>
      </div>

    </div>
  </div>
</section>

<section class="collection">
    <div class="tag">
        <h1>A collection made for those who value quality, comfort, and timeless style.</h1>
    </div>

    <div class="shoes">

        <div class="shoe shoe1">
            <img src="images/sand.png" alt="Beige Horizon">
            <h3>Beige Horizon</h3>
            <p>₹ 5899</p>
        </div>

        <div class="shoe shoe2">
            <img src="images/black-white.png" alt="Monochrome X">
            <h3>Monochrome X</h3>
            <p>₹ 6499</p>
        </div>

        <div class="shoe shoe3">
            <img src="images/green_cropped.png" alt="Forest Drift">
            <h3>Forest Drift</h3>
            <p>₹ 6299</p>
        </div>

    </div>
</section>
<script src="script.js"></script>
</body>
</html>
